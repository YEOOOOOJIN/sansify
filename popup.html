<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comic Sansify</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
    }

    body {
      width: 220px;
      background: #fffbe6;
      border: 3px solid #222;
      overflow: hidden;
    }

    .header {
      background: #ffe135;
      border-bottom: 3px solid #222;
      padding: 12px 16px 10px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      color: #222;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .header .subtitle {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-label {
      font-size: 13px;
      color: #222;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border: 2px solid #222;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border: 2px solid #222;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #ffe135;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .status {
      font-size: 11px;
      color: #444;
      text-align: center;
      min-height: 16px;
    }

    .status.on {
      color: #2a7a2a;
    }

    .status.off {
      color: #999;
    }

    .footer {
      border-top: 2px dashed #ccc;
      padding: 8px 12px;
      text-align: center;
    }

    .footer span {
      font-size: 9px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Comic Sansify</h1>
    <div class="subtitle">the world deserves this</div>
  </div>
  <div class="body">
    <div class="toggle-container">
      <span class="toggle-label">Enable</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="status on" id="status">Comic Sans is ON</div>
  </div>
  <div class="footer">
    <span>applies to current tab</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
